name: Build Samsung S23 Ultra Kernel
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    steps:
    - name: Manage Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex \
        g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev \
        lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
        libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
        schedtool squashfs-tools xsltproc zip zlib1g-dev libc6-dev-i386 x11proto-core-dev \
        libx11-dev libgl1-mesa-dev unzip fontconfig python2 python3 vbindiff

    - name: Clone Kernel Source
      run: git clone https://github.com/samsung-sm8550-cola2261/android_kernel_samsung_sm8550.git --depth=1 -b lineage kernel

    - name: Apply KernelSU Next
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

    - name: Apply SUSFS patch
      run: |
        cd kernel
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15 susfs
        cp -r susfs/kernel_patches/fs/* fs/
        cp -r susfs/kernel_patches/include/linux/* include/linux/
        
        # Apply SUSFS patches
        patch -p1 < susfs/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || true
        # Also apply mac patch if needed
        patch -p1 < susfs/kernel_patches/fs/susfs.c.patch || true

    - name: Setup Clang Toolchain
      run: |
        mkdir -p toolchain
        cd toolchain
        # Download AOSP Clang 17 from a verified tag archive
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r1/clang-r487747c.tar.gz
        tar -xf clang-r487747c.tar.gz
        rm clang-r487747c.tar.gz
        # Ensure binaries are executable
        chmod -R +x bin/

    - name: Build Kernel
      run: |
        cd kernel
        # Recursively find the path to clang and add it to PATH
        CLANG_DIR=$(find $GITHUB_WORKSPACE/toolchain -type f -name "clang" | grep bin/clang | head -n 1 | xargs dirname)
        export PATH=$CLANG_DIR:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="Akramx15"
        export KBUILD_BUILD_HOST="GitHub-Actions"
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 dm3q_defconfig
        make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 anykernel
        cp kernel/out/arch/arm64/boot/Image anykernel/
        cd anykernel
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' anykernel.sh
        zip -r9 ../AnyKernel3-Samsung-S23Ultra-KernelSU-Next-SUSFS.zip *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-S23Ultra
        path: AnyKernel3-Samsung-S23Ultra-KernelSU-Next-SUSFS.zip